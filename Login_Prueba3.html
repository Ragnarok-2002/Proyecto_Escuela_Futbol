<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Escuela de Fútbol</title>
    <style>
        body {
            /* Fondo con degradado profundo usando Negro carbón y un toque de Naranja fuego */
            background: linear-gradient(135deg, #1A1A1A 0%, #E65100 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #F5F5F5; /* Blanco humo */
        }

        .glass-card {
            /* Efecto de cristal esmerilado */
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo-area {
            width: 70px;
            height: 70px;
            background-color: #EEFF41; /* Amarillo Volt */
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(238, 255, 65, 0.4);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #F5F5F5; /* Blanco humo */
            font-weight: 800;
        }

        p {
            color: #FFF3E0; /* Naranja suave */
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #F5F5F5;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: none;
            border-color: #EEFF41; /* Resalte en Volt */
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-glow {
            width: 100%;
            padding: 15px;
            background: #E65100; /* Naranja fuego */
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 81, 0, 0.4);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 81, 0, 0.6);
            background: #ff5e00;
        }

        .links {
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }

        .links a {
            color: #EEFF41; /* Amarillo Volt */
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="logo-area">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2a10 10 0 0 1 10 10l-2 2-3-1-2 3-3-1-2 3-2-2a10 10 0 0 1 4-14z"></path>
            </svg>
        </div>
        
        <h1>Bienvenido</h1>
        <p>Panel de Gestión Deportiva</p>
        
        <form>
            <input type="text" class="input-field" placeholder="Nombre de usuario" required>
            <input type="password" class="input-field" placeholder="Contraseña" required>
            
            <button type="submit" class="btn-glow">Ingresar al Sistema</button>
        </form>

        <div class="links">
            ¿Problemas de acceso? <a href="#">Contactar soporte</a>
        </div>
    </div>

</body>
</html>
