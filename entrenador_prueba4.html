<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coach Elite</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'negro-carbon': '#1A1A1A',
        'gris-carbon': '#252525',
        'naranja-fuego': '#E65100',
        'naranja-suave': '#FFF3E0',
        'blanco-humo': '#F5F5F5',
        'amarillo-volt': '#EEFF41',
        'gris-claro': '#B3B3B3'
      }
    }
  }
}
</script>

<style>
.glass-effect {
  background: rgba(37,37,37,0.85);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
}
.fade { animation: fade .3s ease }
@keyframes fade { from{opacity:0;transform:translateY(10px)} to{opacity:1} }
</style>
</head>

<body class="bg-negro-carbon text-blanco-humo font-sans">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 p-6 glass-effect">
<h1 class="text-2xl font-black text-naranja-fuego mb-8">⚽ Coach Elite</h1>

<nav class="space-y-3">
<button onclick="changeSection(this,'dashboard')" class="menu w-full text-left px-4 py-3 rounded-2xl bg-naranja-fuego">Dashboard</button>
<button onclick="changeSection(this,'jugadores')" class="menu w-full text-left px-4 py-3 rounded-2xl hover:bg-gris-carbon">Jugadores</button>
<button onclick="changeSection(this,'entrenamientos')" class="menu w-full text-left px-4 py-3 rounded-2xl hover:bg-gris-carbon">Entrenamientos</button>
<button onclick="changeSection(this,'asistencias')" class="menu w-full text-left px-4 py-3 rounded-2xl hover:bg-gris-carbon">Asistencias</button>
<button onclick="changeSection(this,'pagos')" class="menu w-full text-left px-4 py-3 rounded-2xl hover:bg-gris-carbon">Pagos</button>
</nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-8">

<!-- DASHBOARD -->
<section id="dashboard" class="section fade">
<h2 class="text-3xl font-black mb-6">Dashboard</h2>

<div class="grid md:grid-cols-3 gap-6">
<div class="glass-effect p-6 rounded-3xl">
<p class="text-gris-claro">Jugadores</p>
<h3 id="totalJugadores" class="text-3xl font-bold">0</h3>
</div>

<div class="glass-effect p-6 rounded-3xl">
<p class="text-gris-claro">Entrenamientos</p>
<h3 id="totalEntrenos" class="text-3xl font-bold">0</h3>
</div>
</div>
</section>

<!-- JUGADORES -->
<section id="jugadores" class="section hidden fade">

<div class="flex justify-between mb-6">
<h2 class="text-2xl font-bold">Jugadores</h2>
<button onclick="openModal()" class="bg-naranja-fuego px-5 py-2 rounded-2xl font-bold">+ Nuevo</button>
</div>

<input id="search" placeholder="Buscar..." class="mb-4 w-full p-3 rounded-2xl bg-gris-carbon">

<div class="glass-effect p-6 rounded-3xl">
<table class="w-full">
<thead class="text-gris-claro">
<tr><th>Nombre</th><th>Edad</th><th>Posición</th><th></th></tr>
</thead>
<tbody id="tablaJugadores"></tbody>
</table>
<p id="emptyJugadores" class="text-center text-gris-claro py-4 hidden">Sin jugadores</p>
</div>
</section>

<!-- ENTRENAMIENTOS -->
<section id="entrenamientos" class="section hidden fade">
<div class="flex justify-between mb-6">
<h2 class="text-2xl font-bold">Entrenamientos</h2>
<button onclick="addEntreno()" class="bg-naranja-fuego px-5 py-2 rounded-2xl font-bold">+ Crear</button>
</div>

<div id="listaEntrenos" class="space-y-4"></div>
</section>

<!-- ASISTENCIAS -->
<section id="asistencias" class="section hidden fade">
<h2 class="text-2xl font-bold mb-6">Asistencia</h2>

<div id="listaAsistencia" class="glass-effect p-6 rounded-3xl"></div>
</section>

<!-- PAGOS -->
<section id="pagos" class="section hidden fade">
<h2 class="text-2xl font-bold mb-6">Pagos</h2>

<div class="glass-effect p-6 rounded-3xl">
<button onclick="registrarPago()" class="mb-4 bg-naranja-fuego px-4 py-2 rounded-xl">Registrar Pago</button>
<ul id="listaPagos"></ul>
</div>
</section>

</main>
</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center">
<div class="glass-effect p-6 rounded-3xl w-80">
<h3 class="mb-4 font-bold">Jugador</h3>
<input id="nombre" placeholder="Nombre" class="w-full mb-2 p-2 bg-gris-carbon rounded">
<input id="edad" type="number" placeholder="Edad" class="w-full mb-2 p-2 bg-gris-carbon rounded">
<input id="posicion" placeholder="Posición" class="w-full mb-4 p-2 bg-gris-carbon rounded">

<div class="flex justify-end gap-2">
<button onclick="closeModal()">Cancelar</button>
<button onclick="saveJugador()" class="bg-naranja-fuego px-3 py-1 rounded">Guardar</button>
</div>
</div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-6 right-6 bg-naranja-fuego px-5 py-3 rounded-xl"></div>

<script>

let jugadores = JSON.parse(localStorage.getItem('jugadores')) || []
let entrenos = JSON.parse(localStorage.getItem('entrenos')) || []
let pagos = JSON.parse(localStorage.getItem('pagos')) || []

function saveData(){
localStorage.setItem('jugadores',JSON.stringify(jugadores))
localStorage.setItem('entrenos',JSON.stringify(entrenos))
localStorage.setItem('pagos',JSON.stringify(pagos))
}

function toast(msg){
let t=document.getElementById('toast')
t.innerText=msg
t.classList.remove('hidden')
setTimeout(()=>t.classList.add('hidden'),2000)
}

function changeSection(btn,id){
document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'))
document.getElementById(id).classList.remove('hidden')

document.querySelectorAll('.menu').forEach(b=>b.classList.remove('bg-naranja-fuego'))
btn.classList.add('bg-naranja-fuego')
}

function openModal(){ modal.classList.remove('hidden') }
function closeModal(){ modal.classList.add('hidden') }

function saveJugador(){
let n=nombre.value, e=edad.value, p=posicion.value
if(!n||!e||!p)return toast("Completa todo")

jugadores.push({n,e,p})
saveData()
renderJugadores()
closeModal()
toast("Jugador guardado")
}

function renderJugadores(){
let t=tablaJugadores
t.innerHTML=""

if(jugadores.length==0) emptyJugadores.classList.remove('hidden')
else emptyJugadores.classList.add('hidden')

jugadores.forEach((j,i)=>{
t.innerHTML+=`
<tr class="border-b border-gray-800 hover:bg-gris-carbon">
<td>${j.n}</td>
<td>${j.e}</td>
<td>${j.p}</td>
<td>
<button onclick="deleteJugador(${i})" class="text-red-400">X</button>
</td>
</tr>`
})

totalJugadores.innerText=jugadores.length
renderAsistencia()
}

function deleteJugador(i){
jugadores.splice(i,1)
saveData()
renderJugadores()
toast("Eliminado")
}

function addEntreno(){
entrenos.push({fecha:new Date().toLocaleDateString()})
saveData()
renderEntrenos()
toast("Entrenamiento creado")
}

function renderEntrenos(){
listaEntrenos.innerHTML=""
entrenos.forEach(e=>{
listaEntrenos.innerHTML+=`
<div class="glass-effect p-4 rounded-2xl">
Entrenamiento - ${e.fecha}
</div>`
})
totalEntrenos.innerText=entrenos.length
}

function renderAsistencia(){
listaAsistencia.innerHTML=""
jugadores.forEach(j=>{
listaAsistencia.innerHTML+=`
<div class="flex justify-between border-b border-gray-700 py-2">
<span>${j.n}</span>
<select class="bg-gris-carbon rounded p-1">
<option>✔</option>
<option>❌</option>
</select>
</div>`
})
}

function registrarPago(){
pagos.push({fecha:new Date().toLocaleDateString()})
saveData()
renderPagos()
toast("Pago registrado")
}

function renderPagos(){
listaPagos.innerHTML=""
pagos.forEach(p=>{
listaPagos.innerHTML+=`<li>Pago - ${p.fecha}</li>`
})
}

search.addEventListener('input',function(){
let val=this.value.toLowerCase()
document.querySelectorAll('#tablaJugadores tr').forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val)?'':'none'
})
})

renderJugadores()
renderEntrenos()
renderPagos()

</script>

</body>
</html>
