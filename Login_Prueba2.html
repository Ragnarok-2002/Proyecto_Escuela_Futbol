<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escuela de Fútbol</title>
    <style>
        body {
            /* Fondo Naranja suave para mayor claridad */
            background-color: #FFF3E0; 
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            /* Ventana principal en Negro carbón */
            background-color: #1A1A1A; 
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            /* Título en Blanco humo */
            color: #F5F5F5; 
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            /* Etiquetas en Blanco humo para visibilidad */
            display: block;
            color: #F5F5F5; 
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #2D2D2D;
            border: 1px solid #444;
            border-radius: 8px;
            color: #F5F5F5;
            box-sizing: border-box;
            outline: none;
        }

        .input-group input:focus {
            /* Color Amarillo Volt para el borde al escribir */
            border-color: #EEFF41; 
        }

        .btn-login {
            /* Botón en Naranja fuego */
            background-color: #E65100; 
            color: #FFFFFF;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #BF4300;
        }

        .footer-text {
            margin-top: 25px;
            color: #F5F5F5;
            font-size: 13px;
        }

        .footer-text a {
            /* Enlaces en Amarillo Volt */
            color: #EEFF41; 
            text-decoration: none;
            font-weight: bold;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Acceso Escuela</h1>
        
        <form>
            <div class="input-group">
                <label for="usuario">Usuario / Correo</label>
                <input type="text" id="usuario" placeholder="Ej: entrenador@futbol.com">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>
        </form>

        <div class="footer-text">
            ¿Nuevo en la escuela? <a href="#">Crea tu Registro aquí</a>
        </div>
    </div>

</body>
</html>
